<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient flowing along the C curve: sky blue → blue → purple -->
    <linearGradient id="cGrad" x1="379" y1="140" x2="379" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="40%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Glow filter for start pin -->
    <filter id="pinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for target rings -->
    <filter id="targetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- C shape - thick stroked arc with gradient -->
  <path d="M 379,170 A 150,150 0 1,0 379,342"
        stroke="url(#cGrad)" stroke-width="50" stroke-linecap="round" fill="none"/>

  <!-- ============================================ -->
  <!-- START MARKER: Map Pin (concentric with C top) -->
  <!-- ============================================ -->
  <g filter="url(#pinGlow)" transform="translate(379, 170)">
    <!-- Pin head (circle) — no tail -->
    <circle cx="0" cy="0" r="40" fill="#38bdf8"/>
    <!-- Inner highlight circle -->
    <circle cx="0" cy="0" r="22" fill="#0f172a" opacity="0.3"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- ============================================ -->
  <!-- DESTINATION MARKER: Bullseye (concentric with C bottom) -->
  <!-- ============================================ -->
  <g filter="url(#targetGlow)" transform="translate(379, 342)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#a78bfa" stroke-width="5" opacity="0.45"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.65"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a78bfa" stroke-width="3.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="#a78bfa"/>
    <!-- Crosshair lines -->
    <line x1="0" y1="-40" x2="0" y2="-28" stroke="#a78bfa" stroke-width="2.5" opacity="0.35"/>
    <line x1="0" y1="28" x2="0" y2="40" stroke="#a78bfa" stroke-width="2.5" opacity="0.35"/>
    <line x1="-40" y1="0" x2="-28" y2="0" stroke="#a78bfa" stroke-width="2.5" opacity="0.35"/>
    <line x1="28" y1="0" x2="40" y2="0" stroke="#a78bfa" stroke-width="2.5" opacity="0.35"/>
  </g>
</svg>
