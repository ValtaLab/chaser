<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient flowing along the C curve: sky blue → blue → purple -->
    <linearGradient id="cGrad" x1="379" y1="140" x2="379" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="40%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Glow filter for start pin -->
    <filter id="pinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for target rings -->
    <filter id="targetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- C shape - thick stroked arc with gradient -->
  <path d="M 379,170 A 150,150 0 1,0 379,342"
        stroke="url(#cGrad)" stroke-width="50" stroke-linecap="round" fill="none"/>

  <!-- ============================================ -->
  <!-- START MARKER: Map Pin (top of C, y=170)      -->
  <!-- A classic map pin: circle head + pointed tip -->
  <!-- ============================================ -->
  <g filter="url(#pinGlow)" transform="translate(379, 155)">
    <!-- Pin tail / point -->
    <polygon points="0,28 -9,8 9,8" fill="#38bdf8" opacity="0.9"/>
    <!-- Pin head (circle) -->
    <circle cx="0" cy="-4" r="18" fill="#38bdf8"/>
    <!-- Inner highlight circle -->
    <circle cx="0" cy="-4" r="10" fill="#0f172a" opacity="0.4"/>
    <!-- Center dot -->
    <circle cx="0" cy="-4" r="5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- ============================================ -->
  <!-- DESTINATION MARKER: Target / Bullseye        -->
  <!-- Concentric rings with crosshair lines        -->
  <!-- ============================================ -->
  <g filter="url(#targetGlow)" transform="translate(379, 342)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.75"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#a78bfa"/>
    <!-- Crosshair lines (subtle) -->
    <line x1="0" y1="-22" x2="0" y2="-16" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="16" x2="0" y2="22" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="0" x2="-16" y2="0" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <line x1="16" y1="0" x2="22" y2="0" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
