<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Clip paths to split the C at the horizontal midpoint -->
    <clipPath id="topHalf">
      <rect x="0" y="0" width="512" height="256"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="256" width="512" height="256"/>
    </clipPath>
    <!-- Subtle glow for the junction -->
    <filter id="juncGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- Top half of C: sky blue → blue -->
  <g clip-path="url(#topHalf)">
    <path d="M 379,170 A 150,150 0 0,0 106,256"
          stroke="#38bdf8" stroke-width="50" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Bottom half of C: purple -->
  <g clip-path="url(#bottomHalf)">
    <path d="M 106,256 A 150,150 0 0,1 379,342"
          stroke="#a78bfa" stroke-width="50" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Junction accent: subtle glow at the split point -->
  <circle cx="106" cy="256" r="6" fill="#818cf8" opacity="0.6" filter="url(#juncGlow)"/>

  <!-- Start marker: solid filled circle (top) -->
  <circle cx="379" cy="170" r="15" fill="#38bdf8"/>

  <!-- Destination marker: solid filled circle (bottom) -->
  <circle cx="379" cy="342" r="15" fill="#a78bfa"/>
</svg>
